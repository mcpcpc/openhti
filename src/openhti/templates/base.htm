<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="author" content="Michael Czigler">
    <meta name="description" content="Lightweight hardware test framework">
    <meta name="theme-color" content="#5B4FE9">
    <title>{% block title %}{% endblock %} · OpenHTI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='main.css') }}?v={{ static_mtime('main.css') }}" rel="stylesheet">
    <script>
      /* Inline theme bootstrap — prevents flash */
      (function(){
        var t = localStorage.getItem('app-theme') || 'auto';
        var r = t === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t;
        document.documentElement.setAttribute('data-theme', r);
      })();
    </script>
  </head>
  <body>
    <div class="app-shell">

      <!-- ── Sidebar ── -->
      <nav class="sidebar" id="sidebar" aria-label="Main navigation">
        <div class="sidebar-brand">
          <a href="{{ url_for('home') }}" class="brand-icon" aria-label="OpenHTI home">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <use href="{{ url_for('static', filename='keen-icons.svg') }}#abstract-48"></use>
            </svg>
          </a>
          <span class="brand-name">OpenHTI</span>
        </div>

        <div class="sidebar-nav">
          <span class="sidebar-label">Mode</span>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'home' %} active{% endif %}"
             href="{{ url_for('home') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Select
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'automatic.read' %} active{% endif %}"
             href="{{ url_for('automatic.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            Automatic
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'manual.read' %} active{% endif %}"
             href="{{ url_for('manual.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M13 2.05v2.02c3.95.49 7 3.85 7 7.93 0 3.21-1.81 6-4.72 7.72L13 17v5h5l-1.22-1.22C19.91 19.07 22 15.76 22 12c0-5.18-3.95-9.45-9-9.95zM11 2.05C5.95 2.55 2 6.82 2 12c0 3.76 2.09 7.07 5.22 8.78L6 22h5V2.05z"/></svg>
            Manual
          </a>

          {% if session["unlocked"] %}
          <span class="sidebar-label">Manage</span>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'command.read' %} active{% endif %}"
             href="{{ url_for('command.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 14H5c-.55 0-1-.45-1-1V7c0-.55.45-1 1-1h14c.55 0 1 .45 1 1v10c0 .55-.45 1-1 1zm-8-5.5l4.5-2.5-4.5-2.5v5z"/></svg>
            Commands
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'instrument.read' %} active{% endif %}"
             href="{{ url_for('instrument.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm1-11h-2v3H8v2h3v3h2v-3h3v-2h-3z"/></svg>
            Instruments
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'measurement.read' %} active{% endif %}"
             href="{{ url_for('measurement.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
            Measurements
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'part.read' %} active{% endif %}"
             href="{{ url_for('part.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
            Parts
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'phase.read' %} active{% endif %}"
             href="{{ url_for('phase.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
            Phases
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'procedure.read' %} active{% endif %}"
             href="{{ url_for('procedure.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
            Procedures
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'recipe.read' %} active{% endif %}"
             href="{{ url_for('recipe.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M8.1 13.34l2.83-2.83L3.91 3.5c-1.56 1.56-1.56 4.09 0 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z"/></svg>
            Recipes
          </a>
          <a class="sidebar-link{% if request.url_rule.endpoint == 'setting.read' %} active{% endif %}"
             href="{{ url_for('setting.read') }}">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            Settings
          </a>
          {% endif %}
        </div>

        <div class="sidebar-footer">
          {% if session["unlocked"] %}
          <a class="auth-btn" href="{{ url_for('authorize.logout') }}">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            Logout
          </a>
          {% else %}
          <a class="auth-btn" href="{{ url_for('authorize.login') }}">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
            Login
          </a>
          {% endif %}
          <button class="theme-btn" onclick="cycleTheme()" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0zM7.05 18.36l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z"/></svg>
            <span id="theme-label">Auto</span>
          </button>
          <div class="sidebar-footer-row">
            <span class="version-text">v{{ app_version }}</span>
          </div>
        </div>
      </nav>

      <!-- ── Mobile sidebar overlay ── -->
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <!-- ── Main content ── -->
      <main class="main-content">
        {% block container %}{% endblock %}
      </main>

      <!-- ── Bottom nav (mobile only) ── -->
      <nav class="bottom-nav" aria-label="Mobile navigation">
        <a href="{{ url_for('home') }}"
           class="bottom-nav-item{% if request.url_rule.endpoint == 'home' %} active{% endif %}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Home
        </a>
        <a href="{{ url_for('automatic.read') }}"
           class="bottom-nav-item{% if request.url_rule.endpoint == 'automatic.read' %} active{% endif %}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
          Auto
        </a>
        <a href="{{ url_for('manual.read') }}"
           class="bottom-nav-item{% if request.url_rule.endpoint == 'manual.read' %} active{% endif %}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2.05v2.02c3.95.49 7 3.85 7 7.93 0 3.21-1.81 6-4.72 7.72L13 17v5h5l-1.22-1.22C19.91 19.07 22 15.76 22 12c0-5.18-3.95-9.45-9-9.95zM11 2.05C5.95 2.55 2 6.82 2 12c0 3.76 2.09 7.07 5.22 8.78L6 22h5V2.05z"/></svg>
          Manual
        </a>
        <button id="menu-toggle" class="bottom-nav-item" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
          Menu
        </button>
      </nav>

    </div><!-- /.app-shell -->

    <script src="{{ url_for('static', filename='app.js') }}?v={{ static_mtime('app.js') }}"></script>
  </body>
</html>
