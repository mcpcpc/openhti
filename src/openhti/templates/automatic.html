{% extends 'base.htm' %}
{% block title %}Automatic{% endblock %}
{% block container %}
  <div class="page-header">
    <div class="page-header-left">
      <h1 class="page-title">Automatic Test</h1>

    </div>
    <div class="page-header-actions">
      <button type="reset" form="evaluate" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        Clear
      </button>
      <button type="submit" form="evaluate" class="btn btn-primary" id="run">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        Run
      </button>
    </div>
  </div>

  <div class="test-layout">
    <div class="test-panel">
      <div class="card">
        <div class="card-body">
          <form id="evaluate" onsubmit="return send(event)" method="post">
            <div class="form-group">
              <label class="form-label" for="procedure_id">Procedure</label>
              <select name="procedure_id" class="form-select" id="procedure_id" required>
                {% for procedure in procedures %}
                <option value="{{ procedure.id }}">{{ procedure.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="label">Serial Label</label>
              <input name="label" type="text" class="form-control" id="label"
                     autocomplete="off" autofocus required placeholder="Scan or type…">
            </div>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="data-row">
            <span class="data-label">Test Status</span>
            <span id="state" class="badge badge-neutral">—</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="data-row">
            <span class="data-label">GTIN</span>
            <code class="text-code" id="global_trade_item_number">—</code>
          </div>
          <div class="data-row">
            <span class="data-label">Serial Number</span>
            <code class="text-code" id="serial_number">—</code>
          </div>
          <div class="data-row">
            <span class="data-label">Part Name</span>
            <span class="data-value" id="part_name">—</span>
          </div>
          <div class="data-row">
            <span class="data-label">Part Number</span>
            <span class="data-value" id="part_number">—</span>
          </div>
          <div class="data-row">
            <span class="data-label">Revision</span>
            <span class="data-value" id="revision">—</span>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="card" style="min-height:400px">
        <div class="card-header">
          <span class="card-title">Results</span>
        </div>
        <div class="card-body">
          <div id="accordion" class="results-accordion"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const accordion = document.getElementById("accordion");
    const websocket = new WebSocket(`ws://${location.host}/automatic/ws`);

    websocket.addEventListener('message', function (event) {
      const message = JSON.parse(event.data);
      const procedure = message[0];
      document.getElementById("global_trade_item_number").textContent = procedure.unit_under_test.global_trade_item_number;
      document.getElementById("serial_number").textContent = procedure.unit_under_test.serial_number;
      document.getElementById("part_number").textContent = procedure.unit_under_test.part_number;
      document.getElementById("revision").textContent = procedure.unit_under_test.revision;
      document.getElementById("part_name").textContent = procedure.unit_under_test.part_name;
      const stateEl = document.getElementById("state");
      stateEl.textContent = message[1];
      stateEl.className = `badge badge-${getBadgeClass(message[1])}`;
      updatePhases(procedure.phases);
    });

    websocket.addEventListener("open",  () => console.log("WS connected."));
    websocket.addEventListener("close", () => console.log("WS disconnected."));

    function updatePhases(phases) {
      accordion.innerHTML = "";
      phases.forEach((phase, index) => {
        const phaseId = `phase-${index}`;
        const body = phase.measurements.length < 1
          ? '<span class="text-muted" style="font-size:var(--text-sm)">No measurements</span>'
          : phase.measurements.map(m => `
              <div class="measurement-row">
                <span>${m.name}: <strong>${m.measured_value}${m.units}</strong></span>
                <span class="badge badge-${getBadgeClass(m.outcome)}">${m.outcome}</span>
              </div>`).join("");
        accordion.insertAdjacentHTML("beforeend", `
          <div class="accordion-item">
            <button class="accordion-button" type="button"
              onclick="this.closest('.accordion-item').querySelector('.accordion-collapse').classList.toggle('show')">
              ${phase.name}
            </button>
            <div id="${phaseId}" class="accordion-collapse show">
              <div class="accordion-body">${body}</div>
            </div>
          </div>`);
      });
    }

    function getBadgeClass(value) {
      return { PASS: 'success', FAIL: 'danger', ERROR: 'warning' }[value] || 'neutral';
    }

    function send(event) {
      const data = {};
      new FormData(event.target).forEach((v, k) => data[k] = v);
      websocket.send(JSON.stringify(data));
      event.target.reset();
      return false;
    }
  </script>
{% endblock %}
